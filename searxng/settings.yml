# Configuração mínima do SearXNG para uso como API (formato JSON habilitado).
use_default_settings: true

general:
  instance_name: "Profinho Search"
  debug: false

server:
  # Troque por um valor aleatório forte em produção.
  secret_key: "troque-este-secret-key-profinho"
  limiter: false
  image_proxy: true

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "pt-BR"
  # Habilita resposta em JSON (necessário para a API consumir).
  formats:
    - html
    - json

ui:
  default_locale: "pt-BR"
